name: Android Integration CI

# Instrumented-test job that boots a Firebase Emulator Suite + an Android
# AVD and runs `connectedDebugAndroidTest`. Separate from `android-ci.yml`
# because AVD boot + test run adds ~15-20 min and the existing workflow is
# already at ~15 min. Split lets the faster `lint-and-test` keep its
# current PR-cycle characteristics while this one runs on a more selective
# trigger matrix.
#
# Triggers (merge-only):
#  - push to main — catches regressions after merge, acts as the primary
#    verification that emulator-backed tests still pass.
#  - workflow_dispatch — on-demand manual runs (e.g. testing the workflow
#    itself, or re-running after a transient AVD/emulator failure).
#  - No pull_request / merge_group triggers. If branch protection still
#    requires the `connected-tests` status, drop it from required checks
#    or PRs will block forever waiting for a status that never posts.
#
# Host choice: ubuntu-latest with KVM enabled (the standard AVD setup on
# GitHub's Linux runners). macOS runners boot AVDs faster but cost 10x
# the minutes; not worth it for a main-branch verification lane.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'firebase.json'
      - '.github/workflows/android-integration.yml'
      - '.github/actions/setup-android/**'

concurrency:
  group: android-integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write        # capture-failure reusable workflow pushes to ci-logs branch
  pull-requests: read
  checks: read
  actions: read          # capture-failure-log fetches job logs via API

jobs:
  connected-tests:
    # PR branches only run if the `ci:integration` label was applied; push
    # to main always runs; workflow_dispatch always runs.
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'ci:integration')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Flips `USE_FIREBASE_EMULATOR` at build time via the env-var hook
      # in app/build.gradle.kts, so the APK under test routes Firestore
      # and Auth at the locally-running emulator instead of production.
      USE_FIREBASE_EMULATOR: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}

      - uses: ./.github/actions/setup-android

      # Audit PR #876 → CI pathway efficiency Tier B #5: share `app/build`
      # cache with `android-ci.yml`'s autofix + lint-and-test jobs (which
      # already populate this key on every PR). Same key shape — gradle
      # build files only — so a Kotlin-only diff still hits the cache.
      # connectedDebugAndroidTest depends on a debug APK build; cache hit
      # skips the cold compile and shaves ~30-60s off labeled
      # `ci:integration` PR runs.
      - uses: actions/cache@v5
        with:
          path: app/build
          key: app-build-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            app-build-${{ runner.os }}-

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      # Audit PR #876 → CI pathway efficiency Tier C #3: cache the
      # firebase-tools global install. `npm install -g firebase-tools@latest`
      # was running ~15-20s on every integration job (re-resolving the
      # latest version from the npm registry, downloading the tarball,
      # writing /usr/local/lib/node_modules/firebase-tools/...). Pinning
      # to firebase-tools@15 (current major as of 2026-04, verified via
      # `npm view firebase-tools versions`; latest 15.15.1) lets us cache
      # by a stable key. Cache miss falls through to fresh install — no
      # reliability regression. Bump the `v15` key suffix when upgrading
      # to a new major; a stale cache won't break the build, it'll just
      # serve an older 15.x point release until invalidated.
      - name: Cache firebase-tools install
        id: fb-tools-cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            /usr/local/lib/node_modules/firebase-tools
            /usr/local/bin/firebase
          key: firebase-tools-${{ runner.os }}-v15

      # `actions/cache@v4` does not reliably round-trip the
      # /usr/local/bin/firebase symlink that `npm install -g` creates —
      # cache restore reports success, the package directory is back, but
      # `firebase` isn't on PATH (exit 127 in `Verify firebase-tools available`).
      # Falling back to `npm install` whenever the binary is missing covers
      # both cache miss and the symlink-loss-on-restore case in one step.
      - name: Install firebase-tools (cache miss or symlink lost)
        run: |
          if ! command -v firebase &> /dev/null; then
            npm install -g firebase-tools@15
          fi

      - name: Verify firebase-tools available
        run: firebase --version

      - name: Start Firebase Emulator Suite
        # Start the emulator in the background, record its PID, and wait
        # for the Firestore (8080) and Auth (9099) ports to become
        # reachable before invoking anything that talks to Firebase.
        # `--project demo-prismtask` keeps the emulator in its
        # single-project mode (per firebase.json `singleProjectMode`) and
        # avoids prompting for a project.
        run: |
          set -euo pipefail
          firebase emulators:start \
            --only firestore,auth \
            --project demo-prismtask \
            > "$RUNNER_TEMP/firebase-emulators.log" 2>&1 &
          echo "FIREBASE_EMULATORS_PID=$!" >> "$GITHUB_ENV"
          echo "Waiting for emulator ports to open..."
          for port in 8080 9099; do
            timeout 120 bash -c \
              "until (echo > /dev/tcp/127.0.0.1/$port) 2>/dev/null; do sleep 1; done" || {
                echo "::error::Firebase emulator port $port did not become ready in time"
                cat "$RUNNER_TEMP/firebase-emulators.log" || true
                exit 1
              }
          done
          echo "Firebase emulators ready (firestore=8080, auth=9099)"

      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests against AVD + Firebase emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-boot-timeout: 1200
          # Headless runner; no window server. Disable animations so
          # Compose interactions don't race against spurious redraws.
          script: |
            adb devices
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0
            # AVD already reaches the host emulators via 10.0.2.2 (hard-
            # coded in PrismTaskApplication.configureFirebaseEmulator),
            # so no `adb reverse` is needed. Confirm by pinging the
            # emulator UI from inside the AVD.
            adb shell "ping -c 1 10.0.2.2 || true"
            ./gradlew connectedDebugAndroidTest --no-daemon --continue

      - name: Stop Firebase emulators
        if: always()
        run: |
          if [ -n "${FIREBASE_EMULATORS_PID:-}" ]; then
            kill "$FIREBASE_EMULATORS_PID" || true
            wait "$FIREBASE_EMULATORS_PID" 2>/dev/null || true
          fi

      - name: Upload emulator logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: firebase-emulator-log
          path: ${{ runner.temp }}/firebase-emulators.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload instrumented test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: connected-test-results
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
          retention-days: 7
          if-no-files-found: ignore

  # Quarantined lane for the medication cross-device sync tests (C3 of
  # the medication migration safety net). Kept separate from
  # `connected-tests` because the connected-tests suite has a ~22%
  # baseline flake rate (per memory `project_integration_ci_history.md`)
  # — mixing genuinely network-dependent tests in spikes the false-fail
  # rate above what the team can absorb. This job:
  #
  #  - is NOT in the branch-protection required-status list (configure
  #    in GitHub repo settings; the workflow itself can't enforce this);
  #  - runs only the medication scenario class so it stays fast;
  #  - runs a single test attempt (no shell-level retry). The previous
  #    `run || run --rerun-tasks` form doubled wall-clock and pushed
  #    the job past `timeout-minutes: 45` whenever no concurrent push
  #    pre-empted it (run `24970283404`, sha `871c2da8`, 45m5s
  #    timeout-exceeded). Real flakes now surface as honest failures
  #    rather than convergence-on-retry — matches the connected-tests
  #    job's no-retry shape (which sustains ~91% success).
  #
  # When to batch (CI_AUDIT_2026-04-30 F8): the AVD-boot + Firebase
  # emulator boot amortizes across however many test classes you run
  # in one connectedAndroidTest invocation, but right now the lane
  # spends ~80% of its wall-clock on cold infra for a SINGLE class.
  # That's fine at one or two quarantined classes; it gets wasteful
  # past three. If a third class lands here, swap
  # `-Pandroid.testInstrumentationRunnerArguments.class=...` for
  # `-Pandroid.testInstrumentationRunnerArguments.package=
  # com.averycorp.prismtask.sync.scenarios` and have all quarantined
  # cross-device classes live under that package — one job runs the
  # whole batch and the boot cost amortizes properly. Keep the
  # single-class shape until then.
  cross-device-tests:
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'ci:integration')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      USE_FIREBASE_EMULATOR: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref }}

      - uses: ./.github/actions/setup-android

      # Audit PR #876 → CI pathway efficiency Tier B #5: share `app/build`
      # cache with `android-ci.yml`'s autofix + lint-and-test jobs (which
      # already populate this key on every PR). Same key shape — gradle
      # build files only — so a Kotlin-only diff still hits the cache.
      # connectedDebugAndroidTest depends on a debug APK build; cache hit
      # skips the cold compile and shaves ~30-60s off labeled
      # `ci:integration` PR runs.
      - uses: actions/cache@v5
        with:
          path: app/build
          key: app-build-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            app-build-${{ runner.os }}-

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      # Audit PR #876 → CI pathway efficiency Tier C #3: cache the
      # firebase-tools global install. `npm install -g firebase-tools@latest`
      # was running ~15-20s on every integration job (re-resolving the
      # latest version from the npm registry, downloading the tarball,
      # writing /usr/local/lib/node_modules/firebase-tools/...). Pinning
      # to firebase-tools@15 (current major as of 2026-04, verified via
      # `npm view firebase-tools versions`; latest 15.15.1) lets us cache
      # by a stable key. Cache miss falls through to fresh install — no
      # reliability regression. Bump the `v15` key suffix when upgrading
      # to a new major; a stale cache won't break the build, it'll just
      # serve an older 15.x point release until invalidated.
      - name: Cache firebase-tools install
        id: fb-tools-cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            /usr/local/lib/node_modules/firebase-tools
            /usr/local/bin/firebase
          key: firebase-tools-${{ runner.os }}-v15

      # `actions/cache@v4` does not reliably round-trip the
      # /usr/local/bin/firebase symlink that `npm install -g` creates —
      # cache restore reports success, the package directory is back, but
      # `firebase` isn't on PATH (exit 127 in `Verify firebase-tools available`).
      # Falling back to `npm install` whenever the binary is missing covers
      # both cache miss and the symlink-loss-on-restore case in one step.
      - name: Install firebase-tools (cache miss or symlink lost)
        run: |
          if ! command -v firebase &> /dev/null; then
            npm install -g firebase-tools@15
          fi

      - name: Verify firebase-tools available
        run: firebase --version

      - name: Start Firebase Emulator Suite
        run: |
          set -euo pipefail
          firebase emulators:start \
            --only firestore,auth \
            --project demo-prismtask \
            > "$RUNNER_TEMP/firebase-emulators.log" 2>&1 &
          echo "FIREBASE_EMULATORS_PID=$!" >> "$GITHUB_ENV"
          echo "Waiting for emulator ports to open..."
          for port in 8080 9099; do
            timeout 120 bash -c \
              "until (echo > /dev/tcp/127.0.0.1/$port) 2>/dev/null; do sleep 1; done" || {
                echo "::error::Firebase emulator port $port did not become ready in time"
                cat "$RUNNER_TEMP/firebase-emulators.log" || true
                exit 1
              }
          done
          echo "Firebase emulators ready (firestore=8080, auth=9099)"

      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # We still write the script to a file (rather than inlining under
      # `script:`) for the same reason as before: PRs #773 / #776 showed
      # `reactivecircus/android-emulator-runner@v2` splits multi-line
      # `script:` input on newlines and runs each line as a fresh
      # `sh -c`, breaking any multi-line shell construct. A single-line
      # `bash <file>` invocation keeps the script intact even though it's
      # now just a linear sequence of commands.
      - name: Write cross-device test runner
        run: |
          cat > "$RUNNER_TEMP/run-cross-device-tests.sh" <<'BASH'
          #!/usr/bin/env bash
          set -euo pipefail
          adb devices
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0
          adb shell "ping -c 1 10.0.2.2 || true"
          TEST_CLASS=com.averycorp.prismtask.sync.scenarios.MedicationCrossDeviceConvergenceTest
          ./gradlew :app:connectedDebugAndroidTest \
            "-Pandroid.testInstrumentationRunnerArguments.class=$TEST_CLASS" \
            --no-daemon
          BASH
          chmod +x "$RUNNER_TEMP/run-cross-device-tests.sh"

      - name: Run medication cross-device tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-boot-timeout: 1200
          script: bash "$RUNNER_TEMP/run-cross-device-tests.sh"

      - name: Stop Firebase emulators
        if: always()
        run: |
          if [ -n "${FIREBASE_EMULATORS_PID:-}" ]; then
            kill "$FIREBASE_EMULATORS_PID" || true
            wait "$FIREBASE_EMULATORS_PID" 2>/dev/null || true
          fi

      - name: Upload cross-device test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cross-device-test-results
          path: |
            app/build/reports/androidTests/
            app/build/outputs/androidTest-results/
          retention-days: 7
          if-no-files-found: ignore

  capture-failure-log:
    needs: [connected-tests]
    if: ${{ failure() }}
    uses: ./.github/workflows/capture-failure.yml
    with:
      workflow-slug: android-integration
