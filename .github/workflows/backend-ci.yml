name: Backend CI

on:
  # Merge-only: CI runs on push to main (post-merge) and manual dispatch.
  # No pull_request / merge_group triggers — if branch protection requires
  # the `test` status, drop it from required checks or PRs will block
  # forever waiting for a status that never posts.
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write        # capture job pushes to ci-logs branch
  checks: read
  actions: read          # capture-failure-log fetches job logs via API

jobs:
  test:
    # Required status check for branch protection: must post even on PRs
    # that don't touch `backend/**`. Postgres + pytest only run when
    # `relevance.outputs.backend` is true. The previous `services:
    # postgres:` block was workflow-level so GitHub provisioned Postgres
    # on every PR regardless — ~10–15s of wasted boot per non-backend PR
    # (CI_AUDIT_2026-04-30 F6). Replaced with an inline `docker run -d`
    # step that's `if:`-gated on relevance, so irrelevant PRs skip
    # Postgres entirely.
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/averytask_test
      JWT_SECRET_KEY: test-secret-key
      ENVIRONMENT: dev
      # Placeholder — prevents import errors in tests that initialize the Anthropic client
      ANTHROPIC_API_KEY: test-key

    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: relevance
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/backend-ci.yml'
      - name: Short-circuit (no backend changes)
        if: steps.relevance.outputs.backend != 'true'
        run: echo "✓ No backend paths changed; test job is a no-op (no Postgres provisioned)."

      - name: Start Postgres (relevance-gated)
        if: steps.relevance.outputs.backend == 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker run -d \
            --name postgres \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=averytask_test \
            -p 5432:5432 \
            --health-cmd 'pg_isready -U postgres' \
            --health-interval 10s \
            --health-timeout 5s \
            --health-retries 5 \
            postgres:16
          # Block until pg_isready returns 0 — we don't trust the
          # docker --health-* flags alone here because subsequent steps
          # (alembic upgrade head, pytest fixtures) connect immediately
          # and a flaky readiness probe would surface as a connection
          # refused on alembic, not as a clean retry-here.
          for attempt in $(seq 1 30); do
            if docker exec postgres pg_isready -U postgres -d averytask_test >/dev/null 2>&1; then
              echo "Postgres ready after ${attempt}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Postgres did not become ready within 30s"
          docker logs postgres || true
          exit 1

      - name: Set up Python 3.11
        if: steps.relevance.outputs.backend == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        if: steps.relevance.outputs.backend == 'true'
        run: pip install -r requirements.txt

      - name: Lint with ruff
        if: steps.relevance.outputs.backend == 'true'
        run: ruff check app/ tests/

      - name: Run Alembic migrations
        if: steps.relevance.outputs.backend == 'true'
        run: alembic upgrade head

      - name: Run tests
        # `-x` stops at the first failure, but we still emit a JUnit XML so the
        # verify step below has something to inspect. `--junitxml` writes one
        # report per pytest invocation regardless of pass/fail.
        if: steps.relevance.outputs.backend == 'true'
        run: pytest tests/ -x --tb=short -q --junitxml=junit.xml

      - name: Verify unit-test results (XML)
        # Belt-and-suspenders: even if pytest's exit code somehow ends up zero,
        # a <testsuite> reporting non-zero `failures` or `errors` fails the
        # step. Also fails fast if the XML wasn't produced (pytest never ran).
        if: always() && steps.relevance.outputs.backend == 'true'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          xmls=(junit.xml tests/**/*.xml)
          if [ ${#xmls[@]} -eq 0 ]; then
            echo "::error::No JUnit XML results found in backend/. Did pytest run?"
            exit 1
          fi
          failed=0
          for f in "${xmls[@]}"; do
            fails=$(grep -oE 'failures="[0-9]+"' "$f" | head -n1 | grep -oE '[0-9]+' || echo 0)
            errs=$(grep -oE 'errors="[0-9]+"' "$f" | head -n1 | grep -oE '[0-9]+' || echo 0)
            if [ "${fails:-0}" -gt 0 ] || [ "${errs:-0}" -gt 0 ]; then
              echo "::error file=${f}::${fails} failure(s), ${errs} error(s) in ${f}"
              failed=$((failed + fails + errs))
            fi
          done
          if [ "$failed" -gt 0 ]; then
            echo "::error::${failed} backend-test failure(s)/error(s) detected. See annotations and the test-results artifact."
            exit 1
          fi
          echo "All ${#xmls[@]} JUnit XML reports clean."

      - name: Upload test results
        if: always() && steps.relevance.outputs.backend == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-results
          path: backend/junit.xml
          retention-days: 7
          if-no-files-found: ignore

  capture-failure-log:
    needs: [test]
    if: ${{ failure() }}
    uses: ./.github/workflows/capture-failure.yml
    with:
      workflow-slug: backend-ci
