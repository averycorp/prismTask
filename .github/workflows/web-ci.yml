name: Web CI

on:
  # Merge-only: CI runs on push to main (post-merge) and manual dispatch.
  # No pull_request / merge_group triggers — if branch protection requires
  # the `web-lint-and-test` status, drop it from required checks or PRs
  # will block forever waiting for a status that never posts.
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web-ci.yml'
      - '.github/actions/setup-node-web/**'
  workflow_dispatch:

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write        # capture job pushes to ci-logs branch
  checks: read
  actions: read          # capture-failure-log fetches job logs via API

jobs:
  # Renamed from `lint-and-test` to `web-lint-and-test` so the status-check
  # context does not collide with Android CI's `lint-and-test` job; branch
  # protection dedups shared names into a single requirement, which let a
  # failing Android lint-and-test slip through if Web's passed (or vice versa).
  #
  # Required status check — must post on every PR, so real work is gated
  # on `steps.relevance.outputs.web` rather than a workflow-level path filter.
  web-lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: relevance
        with:
          filters: |
            web:
              - 'web/**'
              - '.github/workflows/web-ci.yml'
              - '.github/actions/setup-node-web/**'
      - name: Short-circuit (no web changes)
        if: steps.relevance.outputs.web != 'true'
        run: echo "✓ No web paths changed; web-lint-and-test is a no-op."
      - uses: ./.github/actions/setup-node-web
        if: steps.relevance.outputs.web == 'true'
      - run: npm run lint
        if: steps.relevance.outputs.web == 'true'
      - run: npm run test:run
        if: steps.relevance.outputs.web == 'true'
      - run: npm run build
        if: steps.relevance.outputs.web == 'true'

  e2e:
    needs: web-lint-and-test
    # e2e is not a required status check; skip entirely when web paths
    # didn't change so we don't spin up a Playwright runner for nothing.
    # Uses the same `paths-filter` check inline (needs outputs can't
    # propagate conveniently).
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: relevance
        with:
          filters: |
            web:
              - 'web/**'
              - '.github/workflows/web-ci.yml'
              - '.github/actions/setup-node-web/**'
      - name: Short-circuit (no web changes)
        if: steps.relevance.outputs.web != 'true'
        run: echo "✓ No web paths changed; e2e is a no-op."
      - uses: ./.github/actions/setup-node-web
        if: steps.relevance.outputs.web == 'true'

      - name: Cache Playwright browsers
        if: steps.relevance.outputs.web == 'true'
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          # Key on Playwright version so cache invalidates on upgrades
          key: playwright-chromium-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.relevance.outputs.web == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Chromium system deps (cache hit path)
        if: steps.relevance.outputs.web == 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        if: steps.relevance.outputs.web == 'true'
        run: npx playwright test

      - name: Upload Playwright report
        if: failure() && steps.relevance.outputs.web == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  capture-failure-log:
    needs: [web-lint-and-test, e2e]
    if: ${{ failure() }}
    uses: ./.github/workflows/capture-failure.yml
    with:
      workflow-slug: web-ci
