name: Web CI

on:
  # PR-time CI: the aggregate `web-lint-and-test` job is the required
  # status check on the web lane. It posts on every PR (using an internal
  # paths-filter to short-circuit each split job to a no-op when no web
  # paths changed) so branch protection's required check always resolves.
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write        # capture job pushes to ci-logs branch
  checks: read
  actions: read          # capture-failure-log fetches job logs via API

jobs:
  web-relevance:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.relevance.outputs.web }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: relevance
        with:
          filters: |
            web:
              - 'web/**'
              - '.github/workflows/web-ci.yml'
              - '.github/actions/setup-node-web/**'

  web-lint:
    needs: web-relevance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - name: Short-circuit (no web changes)
        if: needs.web-relevance.outputs.web != 'true'
        run: echo "✓ No web paths changed; web-lint is a no-op."
      - uses: ./.github/actions/setup-node-web
        if: needs.web-relevance.outputs.web == 'true'
      - name: Run ESLint
        if: needs.web-relevance.outputs.web == 'true'
        run: npm run lint

  web-unit-tests:
    needs: web-relevance
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
        total: [3]
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - name: Short-circuit (no web changes)
        if: needs.web-relevance.outputs.web != 'true'
        run: echo "✓ No web paths changed; web-unit-tests shard ${{ matrix.shard }}/${{ matrix.total }} is a no-op."
      - uses: ./.github/actions/setup-node-web
        if: needs.web-relevance.outputs.web == 'true'
      - name: Run Vitest shard ${{ matrix.shard }}/${{ matrix.total }}
        if: needs.web-relevance.outputs.web == 'true'
        run: npm run test:run -- --shard=${{ matrix.shard }}/${{ matrix.total }}

  web-build:
    needs: web-relevance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - name: Short-circuit (no web changes)
        if: needs.web-relevance.outputs.web != 'true'
        run: echo "✓ No web paths changed; web-build is a no-op."
      - uses: ./.github/actions/setup-node-web
        if: needs.web-relevance.outputs.web == 'true'
      - name: Build web app
        if: needs.web-relevance.outputs.web == 'true'
        run: npm run build

  # Aggregate required status. The actual work is split above so lint,
  # unit-test shards, and build post separate CI parts instead of one long
  # all-in-one job. Keep this context stable for existing branch protection.
  web-lint-and-test:
    needs: [web-lint, web-unit-tests, web-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify split web checks
        run: |
          if [ '${{ needs.web-lint.result }}' != 'success' ]; then
            echo "web-lint finished with ${{ needs.web-lint.result }}" >&2
            exit 1
          fi
          if [ '${{ needs.web-unit-tests.result }}' != 'success' ]; then
            echo "web-unit-tests finished with ${{ needs.web-unit-tests.result }}" >&2
            exit 1
          fi
          if [ '${{ needs.web-build.result }}' != 'success' ]; then
            echo "web-build finished with ${{ needs.web-build.result }}" >&2
            exit 1
          fi
          echo "✓ Split web lint, unit-test shards, and build passed."

  e2e:
    needs: web-lint-and-test
    # e2e is not a required status check; skip entirely when web paths
    # didn't change so we don't spin up a Playwright runner for nothing.
    # Uses the same `paths-filter` check inline (needs outputs can't
    # propagate conveniently).
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: relevance
        with:
          filters: |
            web:
              - 'web/**'
              - '.github/workflows/web-ci.yml'
              - '.github/actions/setup-node-web/**'
      - name: Short-circuit (no web changes)
        if: steps.relevance.outputs.web != 'true'
        run: echo "✓ No web paths changed; e2e is a no-op."
      - uses: ./.github/actions/setup-node-web
        if: steps.relevance.outputs.web == 'true'

      - name: Cache Playwright browsers
        if: steps.relevance.outputs.web == 'true'
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          # Key on Playwright version so cache invalidates on upgrades
          key: playwright-chromium-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.relevance.outputs.web == 'true' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Chromium system deps (cache hit path)
        if: steps.relevance.outputs.web == 'true' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        if: steps.relevance.outputs.web == 'true'
        run: npx playwright test

      - name: Upload Playwright report
        if: failure() && steps.relevance.outputs.web == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  capture-failure-log:
    needs: [web-lint-and-test, e2e]
    if: ${{ failure() }}
    uses: ./.github/workflows/capture-failure.yml
    with:
      workflow-slug: web-ci
