name: Android CI

on:
  workflow_dispatch:
  # Merge-only: CI runs on push to main (post-merge) and manual dispatch.
  # No pull_request / merge_group triggers — if branch protection requires
  # the `lint-and-test` status, drop it from required checks or PRs will
  # block forever waiting for a status that never posts.
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/android-ci.yml'
      - '.github/actions/setup-android/**'

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write        # autofix needs to commit; capture job pushes to ci-logs branch
  pull-requests: read
  checks: read
  actions: read          # capture-failure-log fetches job logs via API

jobs:
  # Option 2: autofix runs in PARALLEL with lint-and-test. Both check out
  # the PR's original head SHA so they see identical content. ktlintCheck
  # remains the authoritative formatting verdict in this job; lint-and-test
  # never re-runs it. detekt and Android lint in lint-and-test are
  # insensitive to ktlint formatting differences, so the parallelization
  # is safe.
  #
  # Token choice (audit C0): when `secrets.AUTOFIX_PAT` is set, the
  # autofix commit is authored under the PAT's owner rather than
  # github-actions[bot]. This is the *only* way to get the auto-format
  # commit to trigger downstream required-check workflows — GITHUB_TOKEN-
  # pushed commits never trigger workflow runs (documented GitHub Actions
  # behavior). Without the PAT, autofix's push leaves the head SHA with
  # zero check runs and branch protection blocks merge until a user-
  # pushed commit retriggers CI. PRs #755 / #759 hit this and required
  # 2-3 manual empty-commit retriggers each. PR #754's [skip ci] removal
  # addressed half the problem; this addresses the other half.
  #
  # Setup: create a fine-scoped PAT (Contents: Read+Write, Pull Requests:
  # Read) on a maintainer account and store as `AUTOFIX_PAT` repo secret.
  # Falls back to GITHUB_TOKEN gracefully — workflow still functions, just
  # without the trigger-CI side effect.
  autofix:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Autofix needs the branch ref (not the SHA) so `git push` has an
          # upstream to push to. Lint-and-test below pins to the SHA to
          # eliminate the parallel-execution race window.
          token: ${{ secrets.AUTOFIX_PAT || secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      # Skip the Gradle cold-start entirely when the PR doesn't touch
      # Android code — saves ~2 min per irrelevant PR. Relevance pattern
      # must stay in sync with the `paths:` list on the `push:` trigger
      # above.
      - uses: dorny/paths-filter@v4
        id: relevance
        with:
          filters: |
            android:
              - 'app/**'
              - 'gradlew'
              - 'gradlew.bat'
              - 'gradle/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - '.github/workflows/android-ci.yml'
              - '.github/actions/setup-android/**'
      - name: Short-circuit (no Android changes)
        if: steps.relevance.outputs.android != 'true'
        run: echo "✓ No Android paths changed; autofix is a no-op."
      - uses: ./.github/actions/setup-android
        if: steps.relevance.outputs.android == 'true'
      # Audit C3 — cache `app/build/` between runs. Key on Gradle build
      # files only (NOT on Kotlin sources) so the cache stays warm across
      # PRs that only touch Kotlin. Gradle's content-addressed task graph
      # invalidates only the affected tasks on a Kotlin diff; unchanged
      # tasks restore from cache. ~/.gradle/caches is already managed by
      # gradle/actions/setup-gradle@v4 (called inside setup-android), so
      # this only handles the project build/ outputs.
      - uses: actions/cache@v5
        if: steps.relevance.outputs.android == 'true'
        with:
          path: app/build
          key: app-build-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            app-build-${{ runner.os }}-
      - name: ktlint auto-format
        id: ktlint_format
        if: steps.relevance.outputs.android == 'true'
        run: ./gradlew ktlintFormat --continue
      - name: detekt auto-correct
        id: detekt_autocorrect
        if: always() && steps.relevance.outputs.android == 'true'
        run: ./gradlew detekt --auto-correct --continue
      # Commit message intentionally does NOT include [skip ci]. See the
      # header comment on this job for the full rationale — TL;DR: branch
      # protection's required statuses post against the head SHA, and
      # [skip ci] prevents the required-check workflows from running on
      # the autofix commit, which deadlocks the PR. Auto-merge already
      # skips bot synchronize events via `sender.type != 'Bot'`, so
      # there's no risk of auto-merge looping on the re-trigger.
      # Runs even if the auto-fix steps exited non-zero so partial fixes
      # still get committed, but the job as a whole still fails so
      # unfixable issues aren't silently ignored.
      # Two-stage push: first try the checkout-time token (AUTOFIX_PAT when
      # set, GITHUB_TOKEN otherwise). On 403, fall back to GITHUB_TOKEN
      # explicitly. AUTOFIX_PAT going stale is a recurring failure mode —
      # most recently when this repo was transferred from a user account
      # to the `averycorp` org on 2026-04-28, which silently invalidated
      # the fine-grained PAT for the new owner. Without a fallback, every
      # PR that needs formatting fixes deadlocks until a maintainer
      # rotates the PAT. The fallback push uses GITHUB_TOKEN, which can't
      # trigger downstream check workflows (a documented GitHub Actions
      # limitation), so the warning below tells reviewers to push an
      # empty commit if branch protection blocks the merge.
      - name: Commit formatting fixes
        if: always() && steps.relevance.outputs.android == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "✓ No formatting fixes; nothing to commit."
            exit 0
          fi
          git add -A
          git commit -m "style: auto-format"
          if git push 2>push.err; then
            echo "✓ Pushed with checkout-time token (AUTOFIX_PAT when configured — downstream workflows will fire)."
            exit 0
          fi
          cat push.err
          if grep -qE '(403|denied|Permission)' push.err; then
            echo "::warning title=AUTOFIX_PAT push denied (403)::Falling back to GITHUB_TOKEN. AUTOFIX_PAT likely lacks Contents:Write on this repo (common after a repo transfer to a new org owner — fine-grained PATs need re-approval). Rotate AUTOFIX_PAT against the current owner to restore downstream-workflow triggering."
          else
            echo "::warning title=Initial autofix push failed::Falling back to GITHUB_TOKEN. See push.err output above."
          fi
          # Replace the extraheader installed by actions/checkout@v6 (which
          # carries the broken AUTOFIX_PAT). Without this, git push keeps
          # sending the failing PAT regardless of any URL-embedded token,
          # because the Authorization extraheader takes precedence over
          # URL-embedded credentials in libcurl's auth ordering.
          TOKEN_B64=$(printf 'x-access-token:%s' "${GITHUB_TOKEN}" | base64 -w0)
          git config --local --unset-all "http.https://github.com/.extraheader" || true
          git config --local "http.https://github.com/.extraheader" "AUTHORIZATION: basic ${TOKEN_B64}"
          if git push; then
            echo "::warning title=Pushed via GITHUB_TOKEN fallback::Downstream check workflows do NOT auto-trigger from GITHUB_TOKEN pushes. If branch protection blocks merge on stale required checks, push an empty commit (or rotate AUTOFIX_PAT) to retrigger."
            exit 0
          fi
          echo "::error title=Both push attempts failed::Neither AUTOFIX_PAT nor GITHUB_TOKEN could push the auto-format commit. Format locally (./gradlew ktlintFormat detekt --auto-correct) and push manually."
          exit 1
      # Audit item #8 — run ktlintCheck here (not in lint-and-test) so
      # non-auto-correctable violations (e.g. comments inside
      # value_argument_list) fail THIS job. Saves a Gradle cold-start and
      # ~2 min per PR cycle vs. running it again in lint-and-test. Uses
      # `if: always()` so it runs even if auto-correct steps reported
      # non-zero — the goal is for this final check to be the
      # authoritative ktlint verdict.
      - name: ktlint check (authoritative)
        if: always() && steps.relevance.outputs.android == 'true'
        run: ./gradlew ktlintCheck --continue

  lint-and-test:
    # Option 2 (audit C2): runs in PARALLEL with autofix instead of
    # needs: [autofix]. detekt and Android lint don't care about ktlint
    # formatting, and unit tests don't care about either. ktlintCheck
    # remains the authoritative formatting verdict in the autofix job
    # for PR events; for push events the fallback step below runs it.
    #
    # Checkout pins to `pull_request.head.sha` (NOT the head_ref branch)
    # so autofix's parallel push can't race-update what we read. On push
    # events the branch ref is used since there's no PR context.
    #
    # This job is a required status check in branch protection, so it
    # must always post a result — even on PRs that don't touch Android.
    # The `relevance` filter below gates the actual Gradle work; an
    # irrelevant PR returns success within seconds.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
      - uses: dorny/paths-filter@v4
        id: relevance
        with:
          filters: |
            android:
              - 'app/**'
              - 'gradlew'
              - 'gradlew.bat'
              - 'gradle/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - '.github/workflows/android-ci.yml'
              - '.github/actions/setup-android/**'
      - name: Short-circuit (no Android changes)
        if: steps.relevance.outputs.android != 'true'
        run: echo "✓ No Android paths changed; lint-and-test is a no-op."
      - uses: ./.github/actions/setup-android
        if: steps.relevance.outputs.android == 'true'
      # Audit C3 — same `app/build/` cache as the autofix job. Both jobs
      # share the cache key so the second job to run benefits from the
      # first's writes (actions/cache writes on job success).
      - uses: actions/cache@v5
        if: steps.relevance.outputs.android == 'true'
        with:
          path: app/build
          key: app-build-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            app-build-${{ runner.os }}-
      # ktlintCheck runs in autofix for PR events; for push events autofix
      # is skipped so we fall back to running it here.
      - name: ktlint check (push events only)
        if: github.event_name != 'pull_request' && steps.relevance.outputs.android == 'true'
        run: ./gradlew ktlintCheck --continue
      - name: detekt
        if: always() && steps.relevance.outputs.android == 'true'
        run: ./gradlew detekt --continue
      # Audit PR #876 → CI pathway efficiency Tier C #2: split lint by
      # event. `./gradlew lint` aggregates lintDebug + lintRelease (and
      # any other variants), and lintRelease's R8/proguard-shrunk pass
      # dominates wall-clock — measured at 355s on push:main run
      # 25032580155 (55% of total job time). For PR-time signal,
      # lintDebug catches all source-code issues lintRelease does;
      # lintRelease's exclusive coverage is shrinking-driven obfuscation
      # mismatches, which only matter for the actual release build.
      # Push:main still runs full `lint` so lintRelease findings still
      # gate post-merge. Net savings: ~150-200s per Android PR with
      # lintRelease coverage preserved on the path that matters
      # (release builds).
      # Step names below are intentionally colon-free in the visible label —
      # an earlier shape ("Android lint (push:main: full lint…)") tripped
      # GitHub's YAML parser because `: ` (colon-space) inside an unquoted
      # scalar gets read as a mapping start. Result: workflow showed up as
      # `name: .github/workflows/android-ci.yml` (file path, no parsed name)
      # and zero jobs ran on the push event for run 25036738341.
      - name: Android lint — PR (lintDebug only)
        if: always() && github.event_name == 'pull_request' && steps.relevance.outputs.android == 'true'
        run: ./gradlew lintDebug --continue
      - name: Android lint — push to main (full lint incl. lintRelease)
        if: always() && github.event_name != 'pull_request' && steps.relevance.outputs.android == 'true'
        run: ./gradlew lint --continue
      # Compile (but don't run) androidTest sources so type-level breakage
      # — e.g. a new constructor parameter on a production class without
      # all manual call sites in androidTest updated — fails THIS job
      # instead of the post-merge integration CI lane. PR #743 hit this
      # exact pattern: medicationMarkDao was added to CloudIdOrphanHealer
      # and 4 androidTest files manually constructing the healer broke
      # `compileDebugAndroidTestKotlin`. The structural parity guard
      # (TestDatabaseModuleParityTest, PR #704) covers TestDatabaseModule
      # specifically but not arbitrary call sites; this catches the rest.
      # Cheap because the `app/build` cache (audit C3) is already warm
      # from autofix's parallel compileDebugKotlin run.
      - name: Compile androidTest sources (type-check only)
        if: always() && steps.relevance.outputs.android == 'true'
        run: ./gradlew compileDebugAndroidTestKotlin --continue
      # Robolectric's MavenArtifactFetcher downloads the instrumented Android
      # SDK jar to ~/.m2/repository at test runtime. Its retry semantics are
      # weak (no exponential backoff, no --retry-all-errors equivalent), so a
      # single transient Maven Central CDN 404 wipes out every Robolectric
      # test class — run 25356775019 hit this and 89 unit tests across 13
      # classes failed with FileNotFoundException on
      # `13-robolectric-9030017-i6.{jar,pom,*.sha512}` even though the
      # artifacts exist. Pre-fetching with curl --retry seeds the cache so
      # the runtime fetcher finds it locally and skips the network entirely.
      #
      # Pin: SDK 13 (API 33) is what every @Config(sdk = [33]) test uses,
      # and -i6 is Robolectric 4.13's instrumentation level. Bumping
      # Robolectric in app/build.gradle.kts requires updating the i6 suffix
      # below (4.14 → i7).
      - name: Prefetch Robolectric SDK 33 (Maven Central flake guard)
        if: always() && steps.relevance.outputs.android == 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="13-robolectric-9030017-i6"
          DEP_DIR="$HOME/.m2/repository/org/robolectric/android-all-instrumented/${VERSION}"
          BASE_URL="https://repo1.maven.org/maven2/org/robolectric/android-all-instrumented/${VERSION}"
          ARTIFACT="android-all-instrumented-${VERSION}"
          mkdir -p "$DEP_DIR"
          for ext in jar pom jar.sha512 pom.sha512; do
            file="${ARTIFACT}.${ext}"
            if [ -s "$DEP_DIR/$file" ]; then
              echo "cached: $file"
              continue
            fi
            curl -fsSL --retry 5 --retry-delay 5 --retry-all-errors \
              -o "$DEP_DIR/$file" "$BASE_URL/$file"
            echo "fetched: $file ($(stat -c%s "$DEP_DIR/$file") bytes)"
          done
      - name: Prepare unit-test outputs
        if: steps.relevance.outputs.android == 'true'
        shell: bash
        run: |
          set -euo pipefail
          rm -f unit-test-output.log
          rm -rf app/build/test-results/testDebugUnitTest
      - name: Unit tests — data layer
        # Split the JVM unit suite into smaller CI parts. A single
        # all-classes Gradle invocation previously had a 20-minute timeout,
        # which made failures slow to surface and hard to localize. Each
        # shard appends to unit-test-output.log so the failure-comment step
        # below still has one combined log to summarize.
        if: always() && steps.relevance.outputs.android == 'true'
        timeout-minutes: 8
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew testDebugUnitTest --continue -i \
            --tests 'com.averycorp.prismtask.data.*' \
            2>&1 | tee -a unit-test-output.log
      - name: Unit tests — domain layer
        if: always() && steps.relevance.outputs.android == 'true'
        timeout-minutes: 8
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew testDebugUnitTest --continue -i \
            --tests 'com.averycorp.prismtask.domain.*' \
            2>&1 | tee -a unit-test-output.log
      - name: Unit tests — UI layer
        if: always() && steps.relevance.outputs.android == 'true'
        timeout-minutes: 8
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew testDebugUnitTest --continue -i \
            --tests 'com.averycorp.prismtask.ui.*' \
            2>&1 | tee -a unit-test-output.log
      - name: Unit tests — platform and workers
        if: always() && steps.relevance.outputs.android == 'true'
        timeout-minutes: 8
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew testDebugUnitTest --continue -i \
            --tests 'com.averycorp.prismtask.TaskCompletionAnalyticsTest' \
            --tests 'com.averycorp.prismtask.core.*' \
            --tests 'com.averycorp.prismtask.diagnostics.*' \
            --tests 'com.averycorp.prismtask.feedback.*' \
            --tests 'com.averycorp.prismtask.notifications.*' \
            --tests 'com.averycorp.prismtask.startup.*' \
            --tests 'com.averycorp.prismtask.sync.*' \
            --tests 'com.averycorp.prismtask.widget.*' \
            --tests 'com.averycorp.prismtask.workers.*' \
            2>&1 | tee -a unit-test-output.log
      - name: Verify unit-test results (XML)
        # Belt-and-suspenders: even if Gradle's exit code somehow ends up zero,
        # a single <testsuite> reporting non-zero `failures` or `errors` fails
        # the step. Catches configurations where `ignoreFailures = true` is
        # added to a module, `tee`/shell changes swallow the exit code, or a
        # custom test task reports failures via XML without propagating them.
        if: always() && steps.relevance.outputs.android == 'true'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          xmls=(app/build/test-results/**/*.xml)
          if [ ${#xmls[@]} -eq 0 ]; then
            echo "::error::No JUnit XML results found under app/build/test-results/. Did the test task run?"
            exit 1
          fi
          failed=0
          for f in "${xmls[@]}"; do
            fails=$(grep -oE 'failures="[0-9]+"' "$f" | head -n1 | grep -oE '[0-9]+' || echo 0)
            errs=$(grep -oE 'errors="[0-9]+"' "$f" | head -n1 | grep -oE '[0-9]+' || echo 0)
            if [ "${fails:-0}" -gt 0 ] || [ "${errs:-0}" -gt 0 ]; then
              echo "::error file=${f}::${fails} failure(s), ${errs} error(s) in ${f}"
              failed=$((failed + fails + errs))
            fi
          done
          if [ "$failed" -gt 0 ]; then
            echo "::error::${failed} unit-test failure(s)/error(s) detected. See annotations and the test-results artifact."
            exit 1
          fi
          echo "All ${#xmls[@]} JUnit XML reports clean."
      - name: Post failure details to PR
        if: failure() && github.event_name == 'pull_request' && steps.relevance.outputs.android == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let body = '### CI Unit Test Failure\n\n';
            try {
              const raw = fs.readFileSync('unit-test-output.log', 'utf8');
              const lines = raw.split('\n');
              const errorLines = lines.filter(l =>
                /\be:\b|FAILED|Compilation error|Unresolved reference|not abstract|does not implement/.test(l)
              );
              const tail = lines.slice(-30).join('\n');
              const errors = errorLines.length > 0
                ? errorLines.join('\n')
                : 'No specific error lines matched. Last 30 lines shown.';
              body += '**Error lines:**\n```\n' + errors.slice(0, 2000) + '\n```\n';
              body += '\n**Build tail:**\n```\n' + tail.slice(0, 2000) + '\n```';
            } catch (e) {
              body += 'Could not read unit-test-output.log: ' + e.message;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
      - name: Upload lint report
        if: always() && steps.relevance.outputs.android == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7
      - name: Upload detekt report
        if: always() && steps.relevance.outputs.android == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: detekt-report
          path: app/build/reports/detekt/
          retention-days: 7
      - name: Upload test results
        if: always() && steps.relevance.outputs.android == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: app/build/test-results/
          retention-days: 7

  # Direct-to-main tag + release. Auto-merged PRs use
  # version-bump-and-tag.yml's workflow_run chain instead — `gh pr merge`
  # under GITHUB_TOKEN suppresses the push:main event entirely (GitHub's
  # anti-recursion rule), so this job never fires for auto-merged PRs.
  # It covers the gap where hand-pushed commits to main (docs, version
  # bumps, trivial fixes per CLAUDE.md "Repo conventions") used to land
  # without producing a vX.Y.Z tag or a GitHub Release.
  #
  # Skips its own bump commit via the [skip ci] guard on HEAD — that
  # commit naturally suppresses the next workflow run, but the explicit
  # check defends against workflow_dispatch re-runs and concurrent main
  # pushes that could land a [skip ci] commit at HEAD between trigger
  # and checkout.
  tag-and-release:
    name: Tag & Release
    needs: [lint-and-test]
    # Cross-workflow lock so the tag-push critical section is owned by
    # exactly one path at a time — version-bump-and-tag.yml shares this
    # group. The per-job `git ls-remote --tags` idempotency guards still
    # close the loop on any race that slips through, but this group
    # makes the common case observably serialized. See
    # CI_AUDIT_2026-04-30 F7.
    concurrency:
      group: tag-push-main
      cancel-in-progress: false
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.lint-and-test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write   # workflow_dispatch on release.yml
    steps:
      - uses: actions/checkout@v6
        with:
          # AUTOFIX_PAT (admin) bypasses branch protection for the bump
          # push to main, same rationale as version-bump-and-tag.yml.
          # Falls back to GITHUB_TOKEN if unset — push will then fail
          # loud at "Commit version bump" rather than silently dropping.
          token: ${{ secrets.AUTOFIX_PAT || secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0
      - name: Skip if HEAD is a version bump
        id: skip_check
        run: |
          set -euo pipefail
          MSG=$(git log -1 --pretty=%B)
          if echo "$MSG" | grep -qF '[skip ci]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "✓ HEAD carries [skip ci]; skipping tag/release."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Bump versionCode and versionName
        if: steps.skip_check.outputs.skip != 'true'
        id: version
        run: |
          set -euo pipefail
          CURRENT_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts | head -1)
          if [ -z "${CURRENT_CODE:-}" ]; then
            echo "::error::Could not parse current versionCode from app/build.gradle.kts"
            exit 1
          fi
          NEW_CODE=$(( CURRENT_CODE + 1 ))
          sed -i "s/versionCode = $CURRENT_CODE/versionCode = $NEW_CODE/" app/build.gradle.kts

          CURRENT_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -1)
          if [ -z "${CURRENT_NAME:-}" ]; then
            echo "::error::Could not parse current versionName from app/build.gradle.kts"
            exit 1
          fi
          MAJOR=$(echo "$CURRENT_NAME" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_NAME" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_NAME" | cut -d. -f3)
          NEW_PATCH=$(( PATCH + 1 ))
          NEW_NAME="${MAJOR}.${MINOR}.${NEW_PATCH}"
          sed -i "s/versionName = \"${CURRENT_NAME}\"/versionName = \"${NEW_NAME}\"/" app/build.gradle.kts

          # Hard verify the bump landed on disk before we let any
          # downstream step (commit, tag, release dispatch) proceed.
          # Belt-and-suspenders against a sed substitution that silently
          # didn't match — the goal is "no release without a bump", and
          # an unverified sed plus the no-diff fast-path in the next step
          # could otherwise cut a release pointed at an unbumped commit.
          ACTUAL_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts | head -1)
          ACTUAL_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -1)
          if [ "$ACTUAL_CODE" != "$NEW_CODE" ] || [ "$ACTUAL_NAME" != "$NEW_NAME" ]; then
            echo "::error::Version bump did not land on disk (expected versionCode=$NEW_CODE versionName=$NEW_NAME, got versionCode=$ACTUAL_CODE versionName=$ACTUAL_NAME)"
            exit 1
          fi

          echo "version_name=$NEW_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$NEW_CODE" >> "$GITHUB_OUTPUT"
          echo "Bumping to v$NEW_NAME (build $NEW_CODE)"
      - name: Commit version bump
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add app/build.gradle.kts
          # Strict: a release MUST be preceded by a real bump diff. The
          # bump step above already verified the file changed on disk, so
          # a missing staged diff here means the working tree was reset
          # or the file was reverted between steps — fail loud rather
          # than silently producing a release pointed at an unbumped
          # main tip.
          if git diff --cached --quiet; then
            echo "::error::No staged version-bump diff after bump step. Refusing to tag/release without a real bump."
            exit 1
          fi
          git commit -m "chore: bump to v${{ steps.version.outputs.version_name }} (build ${{ steps.version.outputs.version_code }}) [skip ci]"
          # Concurrent pushes to main can race the bump commit; rebase
          # onto the current tip and retry on rejection. Same shape as
          # version-bump-and-tag.yml so the recovery story is identical.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed version bump on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt; rebasing onto origin/main and retrying"
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "::error::Rebase conflict while replaying version bump; aborting."
              exit 1
            fi
            sleep $((attempt * 2))
          done
          echo "::error::Failed to push version bump after 5 attempts."
          exit 1
      - name: Push patch tag
        if: steps.skip_check.outputs.skip != 'true'
        env:
          NEW_NAME: ${{ steps.version.outputs.version_name }}
          NEW_CODE: ${{ steps.version.outputs.version_code }}
        run: |
          set -euo pipefail
          TAG="v${NEW_NAME}"
          # Idempotency guard against version-bump-and-tag.yml or another
          # concurrent android-ci run racing us to push the same tag.
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists on origin; another run pushed first. Skipping."
            exit 0
          fi
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          git tag -a "${TAG}" -m "PrismTask v${NEW_NAME} (build ${NEW_CODE})"
          for attempt in 1 2 3; do
            if git push origin "${TAG}"; then
              echo "Pushed ${TAG} on attempt ${attempt}"
              exit 0
            fi
            echo "Tag push rejected on attempt ${attempt}; retrying"
            sleep $((attempt * 2))
          done
          echo "::error::Failed to push tag ${TAG} after 3 attempts."
          exit 1
      - name: Dispatch release.yml on the new tag
        # The bump commit's [skip ci] suppresses the tag-push trigger on
        # release.yml, so we dispatch explicitly. workflow_dispatch is one
        # of the documented exceptions to GitHub's GITHUB_TOKEN anti-
        # recursion rule (alongside repository_dispatch), so the dispatch
        # fires even though we're inside a GITHUB_TOKEN-driven run.
        if: steps.skip_check.outputs.skip != 'true' && steps.version.outputs.version_name != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          NEW_NAME: ${{ steps.version.outputs.version_name }}
        run: |
          set -euo pipefail
          TAG="v${NEW_NAME}"
          EXISTING=$(gh run list --repo "$REPO" --workflow=release.yml \
            --limit 20 --json headBranch,databaseId \
            -q ".[] | select(.headBranch == \"${TAG}\") | .databaseId" | head -1 || true)
          if [ -n "$EXISTING" ]; then
            echo "release.yml run ${EXISTING} already exists for ${TAG}; skipping dispatch."
            exit 0
          fi
          gh workflow run release.yml --repo "$REPO" --ref "${TAG}"
          echo "Dispatched release.yml on ${TAG}"

  capture-failure-log:
    needs: [autofix, lint-and-test, tag-and-release]
    if: ${{ failure() }}
    uses: ./.github/workflows/capture-failure.yml
    with:
      workflow-slug: android-ci
