name: Auto-resolve PR merge conflicts

# When an open PR's mergeStateStatus goes DIRTY, this workflow checks
# the branch out, attempts `git merge origin/main`, and — if conflicts
# appear — invokes anthropics/claude-code-action to resolve them. The
# resolved branch is pushed back via AUTOFIX_PAT so downstream
# required-status checks re-run (GITHUB_TOKEN-driven pushes don't
# trigger workflows; documented anti-recursion).
#
# Triggers:
#   - push: main          → after a merge, scan for newly DIRTY PRs
#   - schedule: every 2h  → safety net in case a webhook is missed
#   - workflow_dispatch   → manual debug; optional `pr` input targets a
#                            single PR
#
# Required secrets:
#   - ANTHROPIC_API_KEY   → drives the Claude Code action
#   - AUTOFIX_PAT         → push-back token (already used by
#                            auto-update-branch.yml). Falls back to
#                            GITHUB_TOKEN, in which case downstream
#                            checks won't re-run automatically.
#
# Cost: each invocation runs the Claude Code agent loop, which calls
# the Anthropic API. Conflicts on lock files (package-lock.json,
# Gradle dependency snapshots) are skipped via the path-allowlist
# below — those should be re-resolved by re-running the relevant
# package manager, not by an LLM.

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      pr:
        description: 'PR number to target (leave empty to scan all open PRs)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-resolve-conflicts
  cancel-in-progress: false

jobs:
  enumerate:
    name: Find DIRTY PRs
    runs-on: ubuntu-latest
    outputs:
      prs: ${{ steps.list.outputs.prs }}
      count: ${{ steps.list.outputs.count }}
    steps:
      - name: List DIRTY PRs
        id: list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ONLY_PR: ${{ github.event.inputs.pr }}
        run: |
          set -euo pipefail
          if [ -n "$ONLY_PR" ]; then
            STATE=$(gh pr view "$ONLY_PR" --repo "$REPO" --json mergeStateStatus -q '.mergeStateStatus')
            if [ "$STATE" = "DIRTY" ]; then
              PRS="[$ONLY_PR]"
            else
              echo "PR #$ONLY_PR is $STATE, not DIRTY — nothing to do."
              PRS="[]"
            fi
          else
            # Only own-repo PRs — fork branches can't be pushed back to.
            PRS=$(gh pr list --repo "$REPO" --state open --base main \
              --json number,mergeStateStatus,headRepository,labels \
              -q '[.[]
                    | select(.mergeStateStatus == "DIRTY")
                    | select(.headRepository.nameWithOwner == "'"$REPO"'")
                    | select([.labels[].name] | index("no-auto-resolve") | not)
                    | .number]')
          fi
          COUNT=$(printf '%s' "$PRS" | jq 'length')
          echo "prs=$PRS" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Found $COUNT DIRTY PR(s): $PRS"

  resolve:
    name: "Resolve PR #${{ matrix.pr }}"
    needs: enumerate
    if: needs.enumerate.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pr: ${{ fromJson(needs.enumerate.outputs.prs) }}
      max-parallel: 1
      fail-fast: false
    steps:
      - name: Resolve PR head ref
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          BRANCH=$(gh pr view ${{ matrix.pr }} --repo "$REPO" --json headRefName -q .headRefName)
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.AUTOFIX_PAT || secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "claude-code[bot]"
          git config user.email "claude-code[bot]@users.noreply.github.com"

      - name: Attempt merge with main
        id: merge
        run: |
          set +e
          git fetch origin main
          git merge origin/main --no-edit
          STATUS=$?
          set -e
          if [ "$STATUS" -eq 0 ]; then
            echo "result=clean" >> "$GITHUB_OUTPUT"
            echo "Merge clean — no conflict resolution needed."
          else
            CONFLICTED=$(git diff --name-only --diff-filter=U)
            echo "Conflicted files:"
            printf '%s\n' "$CONFLICTED"
            # Skip if the only conflicts are in lock files — those should
            # be resolved by re-running the package manager, not an LLM.
            if printf '%s\n' "$CONFLICTED" | grep -vE '(package-lock\.json|yarn\.lock|pnpm-lock\.yaml|gradle\.lockfile)$' | grep -q .; then
              echo "result=conflict" >> "$GITHUB_OUTPUT"
            else
              echo "result=lockfile-only" >> "$GITHUB_OUTPUT"
              git merge --abort
              echo "::notice::PR #${{ matrix.pr }}: only lock-file conflicts — leaving for the package manager."
            fi
          fi

      - name: Resolve conflicts via Claude Code
        if: steps.merge.outputs.result == 'conflict'
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            A `git merge origin/main` is in progress on PR #${{ matrix.pr }} (branch `${{ steps.pr.outputs.branch }}`). The working tree contains files with conflict markers.

            Your task:
            1. Run `git status` to see the conflicted files.
            2. For each conflicted file, read both sides of the conflict and resolve it. **Preserve the intent of both sides** — when the two sides change different things, keep both changes; when they change the same thing in incompatible ways, prefer the version on `main` (the incoming side) unless it would obviously break the PR's stated purpose, which you can read from `gh pr view ${{ matrix.pr }}`.
            3. After resolving each file, run `git add <file>`.
            4. Once all files are resolved (no remaining conflict markers, `git diff --name-only --diff-filter=U` is empty), run `git commit --no-edit` to complete the merge — the merge message is already prepared.

            Constraints:
            - Do NOT push. The workflow handles that.
            - Do NOT run any git command other than `status`, `diff`, `add`, `commit --no-edit`, and `pr view` via `gh`.
            - If you cannot resolve a conflict confidently after examining both sides, abort the merge with `git merge --abort` and exit with a brief explanation — the workflow will leave the PR DIRTY and a human will take it.
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--max-turns 20"

      - name: Verify clean state
        if: steps.merge.outputs.result == 'conflict'
        id: verify
        run: |
          set -euo pipefail
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "::error::Conflicts remain after Claude resolution attempt — aborting merge."
            git merge --abort || true
            exit 1
          fi
          if ! git diff --cached --quiet || ! git diff --quiet; then
            echo "::error::Working tree not clean (unstaged or staged changes outside the merge commit)."
            git status
            exit 1
          fi
          # Confirm the merge actually committed.
          if [ -f .git/MERGE_HEAD ]; then
            echo "::error::MERGE_HEAD still present — Claude did not commit."
            exit 1
          fi

      - name: Push resolved branch
        if: steps.merge.outputs.result == 'conflict'
        env:
          AUTH_TOKEN: ${{ secrets.AUTOFIX_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REMOTE_HEAD=$(git rev-parse origin/${{ steps.pr.outputs.branch }})
          LOCAL_HEAD=$(git rev-parse HEAD)
          if [ "$LOCAL_HEAD" = "$REMOTE_HEAD" ]; then
            echo "Local HEAD matches remote — nothing to push."
            exit 0
          fi
          # Re-set the remote URL with the auth token so push works.
          git remote set-url origin "https://x-access-token:${AUTH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin HEAD:${{ steps.pr.outputs.branch }}
          echo "::notice::PR #${{ matrix.pr }}: pushed Claude-resolved merge commit."
