name: Setup Node Web
description: Node 22 and npm ci for web builds (repo must already be checked out)

runs:
  using: composite
  steps:
    - name: Set up Node 22
      uses: actions/setup-node@v4
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: web/package-lock.json

    - name: Install dependencies
      shell: bash
      working-directory: web
      run: npm ci
