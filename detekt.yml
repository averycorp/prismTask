# detekt configuration — PrismTask
#
# Layered on top of detekt's default config (see: buildUponDefaultConfig = true
# in app/build.gradle.kts). Only rules that need overrides for a Jetpack
# Compose + MVVM + Hilt project are listed below.

build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false
  checkExhaustiveness: false

processors:
  active: true

console-reports:
  active: true

output-reports:
  active: true

comments:
  active: true
  CommentOverPrivateFunction:
    active: false
  CommentOverPrivateProperty:
    active: false
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicProperty:
    active: false

complexity:
  active: true
  # Parsers (NaturalLanguageParser.parse) and top-level navigation routes
  # legitimately have high branching. These thresholds are set to catch
  # future regressions without flagging current outliers.
  CyclomaticComplexMethod:
    active: true
    threshold: 65
    ignoreSingleWhenExpression: true
    ignoreSimpleWhenEntries: true
    ignoreNestingFunctions: false
    ignoreAnnotated:
      - 'Composable'
  LongMethod:
    active: true
    threshold: 800
    ignoreAnnotated:
      - 'Composable'
  # Composable functions with hoisted state frequently exceed 12 params.
  LongParameterList:
    active: true
    functionThreshold: 20
    constructorThreshold: 20
    ignoreDefaultParameters: true
    ignoreDataClasses: true
    ignoreAnnotated:
      - 'Composable'
      - 'Inject'
      - 'AssistedInject'
  # ViewModels/repositories naturally accumulate many exposed flows and
  # helpers; DAOs host many @Query methods. Raised to accommodate the
  # current shape (SettingsViewModel: 121, TaskDao: 65).
  TooManyFunctions:
    active: true
    thresholdInFiles: 150
    thresholdInClasses: 150
    thresholdInInterfaces: 80
    thresholdInObjects: 40
    thresholdInEnums: 40
    ignoreAnnotatedFunctions:
      - 'Composable'
      - 'Preview'
  NestedBlockDepth:
    active: true
    threshold: 7
  ComplexCondition:
    active: true
    threshold: 5
  LargeClass:
    active: true
    threshold: 1500

empty-blocks:
  active: true
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true

exceptions:
  active: true
  SwallowedException:
    active: false
  TooGenericExceptionCaught:
    active: false
  TooGenericExceptionThrown:
    active: true
  InstanceOfCheckForException:
    active: true

naming:
  active: true
  # Composable functions use PascalCase — conflicts with FunctionNaming rule.
  FunctionNaming:
    active: false
  # ViewModels and repositories often have top-level constants that don't fit
  # SCREAMING_SNAKE_CASE when they're compose-related (e.g. `ItemHeight`).
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*|[A-Z][a-zA-Z0-9]*'
  MatchingDeclarationName:
    active: false
  # ViewModels commonly use `_state: MutableStateFlow` backing properties,
  # which detekt flags. The ktlint `backing-property-naming` rule is also
  # disabled for the same reason in .editorconfig.
  VariableNaming:
    active: false
  ObjectPropertyNaming:
    active: true

performance:
  active: true
  SpreadOperator:
    active: false
  ArrayPrimitive:
    active: true

potential-bugs:
  active: true
  UnsafeCallOnNullableType:
    active: true
  LateinitUsage:
    active: false
  # String.format default-locale warnings are noisy and non-critical for
  # a single-locale consumer app. Keep off until we commit to i18n.
  ImplicitDefaultLocale:
    active: false

style:
  active: true
  # UI code is full of dp/sp/duration literals. Magic numbers add more noise
  # than signal in a Compose + MVVM codebase, so we disable the rule entirely.
  MagicNumber:
    active: false
  # ktlint already enforces max line length (140) with nicer wrapping; leave
  # detekt's version off to avoid duplicate messages with different columns.
  MaxLineLength:
    active: false
  # MVVM guard-clause helpers and command parsers naturally have many
  # early returns. Bumped to cover VoiceCommandParser.parseCommand (12).
  ReturnCount:
    active: true
    max: 14
    excludedFunctions:
      - 'equals'
  WildcardImport:
    active: true
    excludeImports:
      - 'java.util.*'
  ForbiddenComment:
    active: false
  ForbiddenImport:
    active: false
  NewLineAtEndOfFile:
    active: true
  # UnusedParameter fires constantly on Composables that keep a parameter
  # in their signature for API stability. We rely on Android Lint /
  # compiler warnings to catch genuinely dead parameters.
  UnusedParameter:
    active: false
  # Loop with multiple `break`/`continue` is common in parsers and
  # scheduling code; not inherently a bug.
  LoopWithTooManyJumpStatements:
    active: false
  UnusedPrivateMember:
    active: true
    ignoreAnnotated:
      - 'Preview'
      - 'Composable'
  # Color palettes and layout constants are often held for documentation;
  # leave this off to avoid pressuring teams to delete semantic constants.
  UnusedPrivateProperty:
    active: false
  UnusedPrivateClass:
    active: false
  DataClassContainsFunctions:
    active: false
  UseDataClass:
    active: false
  SerialVersionUIDInSerializableClass:
    active: false
  OptionalUnit:
    active: true
  UseIfInsteadOfWhen:
    active: false
  FunctionOnlyReturningConstant:
    active: false
  DestructuringDeclarationWithTooManyEntries:
    active: true
    maxDestructuringEntries: 4
  MayBeConst:
    active: true
  UseCheckOrError:
    active: true

# detekt-formatting — pulls in ktlint rules via detekt-formatting artifact.
# autoCorrect is wired globally through the Gradle config, but individual
# rules must also enable autoCorrect to participate.
formatting:
  active: true
  android: true
  autoCorrect: true
  # Disabled: duplicates ktlint's own indent rule but with a stricter
  # interpretation that can't be auto-corrected in this codebase. ktlint
  # is the source of truth for formatting — leaving this on produces
  # thousands of duplicate violations.
  Indentation:
    active: false
    autoCorrect: true
    indentSize: 4
  MaximumLineLength:
    active: true
    autoCorrect: false
    maxLineLength: 140
  ArgumentListWrapping:
    active: true
    autoCorrect: true
    maxLineLength: 140
  ParameterListWrapping:
    active: true
    autoCorrect: true
    maxLineLength: 140
  Wrapping:
    active: true
    autoCorrect: true
  NoWildcardImports:
    active: true
    autoCorrect: true
    packagesToUseImportOnDemandProperty: 'java.util.*'
  NoUnusedImports:
    active: true
    autoCorrect: true
  NoSemicolons:
    active: true
    autoCorrect: true
  TrailingCommaOnCallSite:
    active: false
  TrailingCommaOnDeclarationSite:
    active: false
  Filename:
    active: false
  FinalNewline:
    active: true
    autoCorrect: true
    insertFinalNewLine: true
  ImportOrdering:
    # ktlint is the source of truth for import ordering. Keeping the detekt
    # wrapper disabled avoids version/layout drift between detekt-formatting
    # and the standalone ktlint Gradle task.
    active: false
  PackageName:
    active: true
    autoCorrect: true

# ─── PrismTask custom rules ───────────────────────────────────────────────────
#
# HardcodedColorLiteral: warns when Color(0xAARRGGBB) literals appear outside
# the theme layer and user-facing color pickers.
#
# Severity is WARNING — warningsAsErrors is false, so this never fails CI.
#
PrismTaskCustom:
  HardcodedColorLiteral:
    active: true
    excludes:
      - '**/ui/theme/ThemeColors.kt'
      - '**/ui/theme/PriorityColors.kt'
      - '**/ui/theme/LifeCategoryColors.kt'
      - '**/ui/theme/Color.kt'
      - '**/widget/WidgetColors.kt'
      - '**/settings/sections/AppearanceSection.kt'
      - '**/settings/sections/PrismThemeSection.kt'
      - '**/ui/theme/Theme.kt'
      - '**/schoolwork/AddEditCourseScreen.kt'
