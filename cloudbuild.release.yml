steps:
# ==========================================
# VERSION BUMP & TAG
# ==========================================
- id: 'version-bump-and-tag'
  name: 'ubuntu'
  waitFor: ['-']
  secretEnv: ['GITHUB_PAT']
  script: |
    # Setup Git
    apt-get update && apt-get install -y git
    git config --global credential.helper 'store'
    echo "https://$$GITHUB_PAT:x-oauth-basic@github.com" > ~/.git-credentials
    git config --global user.email "cloudbuild@averycorp.com"
    git config --global user.name "Cloud Build"

    git fetch origin main
    git checkout -B main origin/main

    # Bump versionCode
    CURRENT_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' app/build.gradle.kts | head -1)
    NEW_CODE=$(( CURRENT_CODE + 1 ))
    sed -i "s/versionCode = [0-9]*/versionCode = $NEW_CODE/" app/build.gradle.kts

    # Bump versionName patch
    CURRENT_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -1)
    MAJOR=$(echo "$CURRENT_NAME" | cut -d. -f1)
    MINOR=$(echo "$CURRENT_NAME" | cut -d. -f2)
    PATCH=$(echo "$CURRENT_NAME" | cut -d. -f3)
    NEW_PATCH=$(( PATCH + 1 ))
    NEW_NAME="${MAJOR}.${MINOR}.${NEW_PATCH}"
    sed -i "s/versionName = \"${CURRENT_NAME}\"/versionName = \"${NEW_NAME}\"/" app/build.gradle.kts

    # Save to workspace for later steps
    echo "$NEW_NAME" > /workspace/version_name.txt
    echo "$NEW_CODE" > /workspace/version_code.txt
    echo "Bumping to v$NEW_NAME (build $NEW_CODE)"

    # Commit and push
    git add app/build.gradle.kts
    # If no changes, exit early
    git diff-index --quiet HEAD || git commit -m "chore: bump to v${NEW_NAME} (build ${NEW_CODE}) [skip ci]"
    git push origin main

    # Tag and push tag
    TAG="v${NEW_NAME}"
    git tag -a "${TAG}" -m "PrismTask v${NEW_NAME} (build ${NEW_CODE})"
    git push origin "${TAG}"

# ==========================================
# ANDROID RELEASE
# ==========================================
- id: 'decode-keystore'
  name: 'ubuntu'
  waitFor: ['version-bump-and-tag']
  secretEnv: ['KEYSTORE_BASE64']
  script: |
    echo "$$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > app/release.keystore

- id: 'android-build'
  name: 'ghcr.io/cirruslabs/android-sdk:34'
  waitFor: ['decode-keystore']
  secretEnv: ['KEYSTORE_PASSWORD', 'KEY_ALIAS', 'KEY_PASSWORD']
  entrypoint: './gradlew'
  args: ['assembleRelease', 'bundleRelease', '--no-configuration-cache', '--build-cache', '--parallel', '-x', 'lint', '-x', 'lintVitalRelease', '--no-daemon']
  env:
    - 'KEYSTORE_PATH=release.keystore'

- id: 'github-release'
  name: 'ghcr.io/supportpal/github-gh-cli'
  waitFor: ['android-build']
  secretEnv: ['GITHUB_PAT']
  script: |
    VERSION_NAME=$(cat /workspace/version_name.txt)
    TAG="v${VERSION_NAME}"
    export GH_TOKEN="$$GITHUB_PAT"
    gh release create "${TAG}" \
      app/build/outputs/bundle/release/app-release.aab \
      app/build/outputs/apk/release/app-release.apk \
      --title "PrismTask ${TAG}" \
      --generate-notes

- id: 'backend-upload'
  name: 'ubuntu'
  waitFor: ['android-build']
  secretEnv: ['API_BASE_URL', 'DEPLOY_API_KEY']
  script: |
    apt-get update && apt-get install -y curl git
    APK_PATH=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
    VERSION_NAME=$(cat /workspace/version_name.txt)
    VERSION_CODE=$(cat /workspace/version_code.txt)
    NOTES=$(git log -5 --pretty=format:"- %s" | head -c 500)
    curl -f -X POST "$$API_BASE_URL/api/v1/app/releases" \
      -H "Authorization: Bearer $$DEPLOY_API_KEY" \
      -F "version_code=${VERSION_CODE}" \
      -F "version_name=${VERSION_NAME}" \
      -F "release_notes=${NOTES}" \
      -F "apk=@${APK_PATH}"

# ==========================================
# WEB RELEASE
# ==========================================
- id: 'web-install'
  name: 'node:20'
  dir: 'web'
  waitFor: ['version-bump-and-tag']
  entrypoint: 'npm'
  args: ['install']

- id: 'web-build'
  name: 'node:20'
  dir: 'web'
  waitFor: ['web-install']
  entrypoint: 'npm'
  args: ['run', 'build']

- id: 'web-deploy'
  name: 'node:20'
  dir: 'web'
  waitFor: ['web-build']
  secretEnv: ['FIREBASE_TOKEN']
  script: |
    npx firebase deploy --only hosting --token "$$FIREBASE_TOKEN"

# ==========================================
# BACKEND RELEASE
# ==========================================
- id: 'backend-deploy'
  name: 'node:20'
  dir: 'backend'
  waitFor: ['version-bump-and-tag']
  secretEnv: ['RAILWAY_TOKEN']
  script: |
    npm install -g @railway/cli
    railway up --detach

timeout: '3600s'
options:
  machineType: 'E2_HIGHCPU_32'
  logging: 'CLOUD_LOGGING_ONLY'

availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/github_pat/versions/latest
    env: 'GITHUB_PAT'
  - versionName: projects/$PROJECT_ID/secrets/keystore_base64/versions/latest
    env: 'KEYSTORE_BASE64'
  - versionName: projects/$PROJECT_ID/secrets/keystore_password/versions/latest
    env: 'KEYSTORE_PASSWORD'
  - versionName: projects/$PROJECT_ID/secrets/key_alias/versions/latest
    env: 'KEY_ALIAS'
  - versionName: projects/$PROJECT_ID/secrets/key_password/versions/latest
    env: 'KEY_PASSWORD'
  - versionName: projects/$PROJECT_ID/secrets/api_base_url/versions/latest
    env: 'API_BASE_URL'
  - versionName: projects/$PROJECT_ID/secrets/deploy_api_key/versions/latest
    env: 'DEPLOY_API_KEY'
  - versionName: projects/$PROJECT_ID/secrets/firebase_token/versions/latest
    env: 'FIREBASE_TOKEN'
  - versionName: projects/$PROJECT_ID/secrets/railway_token/versions/latest
    env: 'RAILWAY_TOKEN'
